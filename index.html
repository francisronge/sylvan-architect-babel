<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->

    <script>
      window.dataLayer = window.dataLayer || [];

      gtag('config', 'G-7PLSYL5NMW');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylvan Architect Babel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-deep: #020806;
            --steam-gardens-green: #064e3b;
            --rusted-iron: #593a0e;
            --spore-glow: rgba(16, 185, 129, 0.4);
            --emerald-terminal: #10b981;
        }
        body {
            font-family: 'Quicksand', sans-serif;
            color: #ecfdf5;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        body,
        .app-shell,
        .app-shell:fullscreen {
            background-color: var(--forest-deep);
            background-image: 
                radial-gradient(circle at 50% 10%, rgba(16, 185, 129, 0.1) 0%, transparent 70%),
                url("https://www.transparenttextures.com/patterns/dark-matter.png");
        }
        
        /* High-priority override for terminal words */
        .terminal-emerald-force {
            fill: #10b981 !important;
            color: #10b981 !important;
        }

        .god-rays {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                70deg,
                transparent,
                transparent 150px,
                rgba(16, 185, 129, 0.03) 200px,
                transparent 300px
            );
            z-index: 1;
            mask-image: linear-gradient(to bottom, white, transparent);
        }

        .spore-layer {
            position: absolute;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 2;
        }

        .spore {
            position: absolute;
            top: 100vh;
            width: 3px;
            height: 3px;
            border-radius: 9999px;
            background: rgba(16, 185, 129, 0.7);
            box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
            opacity: 0;
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
            animation: float-spore linear infinite;
        }

        @keyframes float-spore {
            0% { transform: translate3d(0, 0, 0) scale(1); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translate3d(var(--spore-drift, 80px), -120vh, 0) scale(0.6); opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .spore {
                animation: none;
                opacity: 0.12;
            }
        }

        .serif {
            font-family: 'Crimson Pro', serif;
        }
        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .moss-gradient {
            background: linear-gradient(135deg, #064e3b 0%, #065f46 100%);
        }
        .tree-canvas-bg {
            background: linear-gradient(to bottom, #04140e 0%, #020806 100%);
            position: relative;
        }
        .tree-canvas-bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/stardust.png");
            opacity: 0.05;
            pointer-events: none;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #050a08;
        }
        ::-webkit-scrollbar-thumb {
            background: #064e3b;
            border-radius: 10px;
        }
        .glass-dark {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        #root {
            height: 100vh;
        }
    </style>
<script type="module" src="/index.tsx"></script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
